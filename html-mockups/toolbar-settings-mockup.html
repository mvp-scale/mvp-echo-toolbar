<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MVP-Echo Toolbar — Settings Mockup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(0 0% 90%)',
            background: 'hsl(0 0% 100%)',
            foreground: 'hsl(0 0% 14.5%)',
            primary: { DEFAULT: 'hsl(227 100% 55%)', foreground: 'hsl(0 0% 100%)' },
            muted: { DEFAULT: 'hsl(0 0% 95%)', foreground: 'hsl(0 0% 55.6%)' },
            destructive: { DEFAULT: 'hsl(0 84% 57.7%)', foreground: 'hsl(0 0% 100%)' },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; margin: 0; padding: 40px; background: #e5e5e5; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .animate-pulse { animation: pulse 1.5s ease-in-out infinite; }
  </style>
</head>
<body>

  <!-- Toolbar Window -->
  <div style="width: 380px;" class="bg-background text-foreground rounded-lg border border-border shadow-xl overflow-hidden flex flex-col">

    <!-- Title bar -->
    <div class="flex items-center justify-between px-3 py-2 border-b border-border bg-muted/30">
      <div class="flex items-center gap-2">
        <div class="w-4 h-4 rounded bg-primary flex items-center justify-center">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" class="text-primary-foreground">
            <path d="M12 2C10.9 2 10 2.9 10 4V12C10 13.1 10.9 14 12 14C13.1 14 14 13.1 14 12V4C14 2.9 13.1 2 12 2Z"/>
            <path d="M18 12C18 15.3 15.3 18 12 18C8.7 18 6 15.3 6 12H4C4 16.4 7.6 20 12 20C16.4 20 20 16.4 20 12H18Z"/>
          </svg>
        </div>
        <span class="text-xs font-semibold">MVP-Echo Toolbar</span>
      </div>
      <button class="w-5 h-5 flex items-center justify-center rounded hover:bg-red-100 text-gray-400 hover:text-red-500">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="1" y1="1" x2="9" y2="9" /><line x1="9" y1="1" x2="1" y2="9" />
        </svg>
      </button>
    </div>

    <!-- Transcription area -->
    <div class="px-4 py-3">
      <div class="flex items-center gap-2 mb-1">
        <span class="text-[10px] font-mono px-1.5 py-0.5 bg-blue-50 text-blue-600 rounded">513ms</span>
      </div>
      <p class="text-sm text-foreground leading-relaxed">This is a test transcription showing the toolbar with settings open.</p>
      <p class="text-[10px] text-muted-foreground mt-1 cursor-pointer hover:text-primary">Click to copy</p>
    </div>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="border-t border-border px-3 py-2 bg-muted/20 max-h-[400px] overflow-y-auto">
      <div class="space-y-2">

        <!-- Engine & Model -->
        <div>
          <label class="text-[9px] font-medium text-muted-foreground block mb-0.5">Engine & Model</label>

          <!-- HOSTED section -->
          <div class="text-[8px] font-semibold text-muted-foreground uppercase tracking-wider mt-1 mb-0.5 px-1">
            Hosted — Fastest
          </div>
          <div class="flex items-center px-2 py-0.5 text-[8px] text-muted-foreground uppercase tracking-wider">
            <span class="flex-1">Model</span>
            <span class="w-[44px] text-right">Quality</span>
            <span class="w-[44px] text-right">Speed</span>
            <span class="w-[52px] text-right">Rating</span>
          </div>

          <!-- English (hosted) - loaded -->
          <button class="w-full flex items-center px-2 py-1 rounded bg-primary/10 text-left" onclick="selectModel(this, 'hosted-english')">
            <div class="flex-1 flex items-center gap-1.5 min-w-0">
              <span class="w-1.5 h-1.5 rounded-full bg-green-400 shrink-0"></span>
              <span class="text-[10px] text-foreground">English</span>
              <span class="text-[7px] bg-primary/10 text-primary px-1 py-0.5 rounded font-medium">recommended</span>
            </div>
            <span class="w-[44px] text-right text-[9px] text-foreground font-bold">99%</span>
            <span class="w-[44px] text-right text-[9px] text-foreground font-bold">&lt;300ms</span>
            <span class="w-[52px] flex justify-end"><span class="flex items-center gap-0.5"><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span></span></span>
          </button>

          <!-- Multilingual (hosted) -->
          <button class="w-full flex items-center px-2 py-1 rounded hover:bg-muted/50 text-left" onclick="selectModel(this, 'hosted-multi')">
            <div class="flex-1 flex items-center gap-1.5 min-w-0">
              <span class="w-1.5 h-1.5 rounded-full border border-gray-300 shrink-0"></span>
              <span class="text-[10px] text-foreground">Multilingual</span>
            </div>
            <span class="w-[44px] text-right text-[9px] text-foreground font-bold">97%</span>
            <span class="w-[44px] text-right text-[9px] text-foreground font-bold">&lt;500ms</span>
            <span class="w-[52px] flex justify-end"><span class="flex items-center gap-0.5"><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span><span class="w-1.5 h-1.5 rounded-full bg-muted-foreground/20"></span></span></span>
          </button>

          <div class="my-1 border-t border-border"></div>

          <!-- LOCAL section -->
          <div class="text-[8px] font-semibold text-muted-foreground uppercase tracking-wider mb-0.5 px-1">
            Local — No Internet Required
          </div>
          <div id="gpuInfo" class="px-2 mb-0.5">
            <span class="text-[8px] text-green-500">WebGPU: Available</span>
          </div>

          <!-- English GPU (local) - needs download -->
          <div id="gpu-model-row">
            <button class="w-full flex items-center px-2 py-1 rounded hover:bg-muted/50 text-left" onclick="handleGpuClick()">
              <div class="flex-1 flex items-center gap-1.5 min-w-0">
                <span id="gpu-indicator" class="w-1.5 h-1.5 rounded-full border border-gray-300 shrink-0"></span>
                <span id="gpu-label" class="text-[10px] text-foreground">English GPU</span>
                <span id="gpu-badge" class="text-[7px] bg-blue-50 text-blue-500 px-1 py-0.5 rounded font-medium cursor-pointer hover:bg-blue-100">download</span>
              </div>
              <span class="w-[44px] text-right text-[9px] text-foreground font-bold">98%</span>
              <span class="w-[44px] text-right text-[9px] text-foreground font-bold">&lt;400ms</span>
              <span class="w-[52px] flex justify-end"><span class="flex items-center gap-0.5"><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span><span class="w-1.5 h-1.5 rounded-full overflow-hidden relative bg-muted-foreground/20"><span class="absolute inset-y-0 left-0 w-1/2 bg-blue-400"></span></span></span></span>
            </button>
          </div>

          <!-- English CPU (local) -->
          <button class="w-full flex items-center px-2 py-1 rounded hover:bg-muted/50 text-left" onclick="selectModel(this, 'local-cpu')">
            <div class="flex-1 flex items-center gap-1.5 min-w-0">
              <span class="w-1.5 h-1.5 rounded-full border border-gray-300 shrink-0"></span>
              <span class="text-[10px] text-foreground">English CPU</span>
            </div>
            <span class="w-[44px] text-right text-[9px] text-foreground font-bold">80%</span>
            <span class="w-[44px] text-right text-[9px] text-foreground font-bold">&lt;2s</span>
            <span class="w-[52px] flex justify-end"><span class="flex items-center gap-0.5"><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span><span class="w-1.5 h-1.5 rounded-full overflow-hidden relative bg-muted-foreground/20"><span class="absolute inset-y-0 left-0 w-1/2 bg-blue-400"></span></span><span class="w-1.5 h-1.5 rounded-full bg-muted-foreground/20"></span><span class="w-1.5 h-1.5 rounded-full bg-muted-foreground/20"></span></span></span>
          </button>

        </div>
      </div>
    </div>

    <!-- Status bar -->
    <div class="flex-shrink-0 flex items-center justify-between px-3 py-1.5 border-t border-border bg-muted/30 text-[10px]">
      <div class="flex items-center gap-2">
        <div class="flex items-center gap-1">
          <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
          <span class="text-muted-foreground font-medium">Ready</span>
        </div>
        <span class="text-muted-foreground">parakeet-tdt-0.6b-v2-int8</span>
      </div>
      <div class="flex items-center gap-1">
        <button class="px-2 py-0.5 rounded text-[9px] font-medium text-muted-foreground hover:text-foreground hover:bg-muted">Debug</button>
        <button class="px-2 py-0.5 rounded text-[9px] font-medium bg-gray-200 text-gray-900 border border-gray-300">Settings</button>
      </div>
    </div>
  </div>

  <script>
    // GPU model states: 'download' → 'downloading' → 'ready' → 'loaded'
    let gpuState = 'download';

    function handleGpuClick() {
      if (gpuState === 'download') {
        startDownload();
      } else if (gpuState === 'ready') {
        activateGpu();
      }
    }

    function startDownload() {
      gpuState = 'downloading';
      const indicator = document.getElementById('gpu-indicator');
      const label = document.getElementById('gpu-label');
      const badge = document.getElementById('gpu-badge');

      indicator.className = 'w-1.5 h-1.5 rounded-full bg-blue-400 animate-pulse shrink-0';
      label.textContent = 'Downloading...';
      label.className = 'text-[10px] text-blue-500 font-semibold';
      badge.textContent = '~630 MB';
      badge.className = 'text-[7px] text-muted-foreground px-1 py-0.5';

      // Simulate download completing after 3 seconds
      setTimeout(() => {
        gpuState = 'ready';
        indicator.className = 'w-1.5 h-1.5 rounded-full border border-gray-300 shrink-0';
        label.textContent = 'English GPU';
        label.className = 'text-[10px] text-foreground';
        badge.textContent = 'ready';
        badge.className = 'text-[7px] bg-green-50 text-green-600 px-1 py-0.5 rounded font-medium';
      }, 3000);
    }

    function activateGpu() {
      gpuState = 'loaded';
      const indicator = document.getElementById('gpu-indicator');
      const label = document.getElementById('gpu-label');
      const badge = document.getElementById('gpu-badge');

      indicator.className = 'w-1.5 h-1.5 rounded-full bg-green-400 shrink-0';
      label.textContent = 'English GPU';
      label.className = 'text-[10px] text-foreground';
      badge.textContent = 'local';
      badge.className = 'text-[7px] bg-primary/10 text-primary px-1 py-0.5 rounded font-medium';

      // Deselect all other models
      document.querySelectorAll('#settingsPanel button').forEach(btn => {
        btn.classList.remove('bg-primary/10');
      });
      document.getElementById('gpu-model-row').querySelector('button').classList.add('bg-primary/10');
    }

    function selectModel(btn) {
      document.querySelectorAll('#settingsPanel button').forEach(b => b.classList.remove('bg-primary/10'));
      btn.classList.add('bg-primary/10');
    }
  </script>

</body>
</html>
